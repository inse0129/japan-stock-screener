name: Daily Stock Data Crawler

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch: 

# 💡 핵심 해결책: 로봇에게 파일 '쓰기(Write)' 권한을 부여합니다.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 💡 노란색 경고를 없애기 위해 부품 버전을 최신(v4, v5)으로 올렸습니다.
    - name: 1. 내 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 필수 부품(라이브러리) 조립하기
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 🚀 크롤러 엔진 가동! (데이터 수집)
      run: python data_maker.py

    - name: 5. 💾 생성된 CSV 파일을 저장소에 업로드
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add *.csv || true
        git commit -m "Auto-update: 오늘의 일본 주식 데이터 봇 수집 완료" || echo "변경된 데이터가 없습니다."
        git push
